<!DOCTYPE html>
<html lang="en">
<head>
    <title>
        Buttons, Anchor Tags as a btn, Btn Sizes, Outlined Styles and Buttons Groups
    </title>
    <!-- bootstrap css cdn -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous"
    />
</head>
<body>
    <!-- Basic Buttoms -->
    <h2>Basic Buttons</h2>
    <div>
        <button class="btn btn-primary">Primary Btn</button>
        <button class="btn btn-info">Info btn</button>
        <button class="btn btn-success">Success Btn</button>
        <button class="btn btn-danger">Danger Btn</button>
        <button class="btn btn-warning">Warning Btn</button>
        <button class="btn btn-ligth">Ligth Btn</button>
        <button class="btn btn-dark">Dark Btn</button>

        <button class="btn btn-link">Link</button>
        <br />
        <hr />
    </div>
    <!-- Anchor Tag as btn  -->
    <h2>Anchor Tag as btn</h2>
    <div>
        <a href="#" class="btn btn-primary">Primary Link as a Btn</a>
        <a href="#" class="btn btn-info">Info Link as a Btn</a>
        <a href="#" class="btn btn-success">Success Link as a Btn</a>
        <a href="#" class="btn btn-danger">Danger Link as a Btn</a>
        <a href="#" class="btn btn-warning">Warning Link as a Btn</a>
        <a href="#" class="btn btn-ligth">Ligth Link as a Btn</a>
        <a href="#" class="btn btn-dark">Dark Link as a Btn</a>
        <br />
        <hr />
    </div>
    
    <!-- Button Sizes -->
    <h2>Button Sizes </h2>
    <div>
        <button class="btn btn-primary">Medium Sized Btn</button>
        <button class="btn btn-secondary btn-sm">Small Sized Btn</button>
        <button class="btn btn-drak btn-lg">Large Sized Btn</button>
        <br />
        <hr />
    </div>
    
    <!-- Outlineed Styles -->
    <h2>Outlineed Styles</h2>
    <div>
        <button class="btn btn-outline-primary">Outlined Primary Button</button>
        <button class="btn btn-outline-info">Outlined info Button</button>
        <button class="btn btn-outline-secondary">Outlined Secondary Button</button>
        <button class="btn btn-outline-success">Outlined Success Button</button>
        <button class="btn btn-outline-ligth">Outlined Ligth Button</button>
        <br />
        <hr />
    </div>
    <!-- Button Groups -->
    <h2>Button Groups</h2>
    <div class="btn-group">
        <a href="#" class="btn btn-primary">Btn-primary</a>
        <a href="#" class="btn btn-secondary">Btn-primary</a>
        <a href="#" class="btn btn-danger">Btn-primary</a>
        <a href="#" class="btn btn-success">Btn-primary</a>
        <br />
        <hr />

    </div>
    
    <!-- bootstrap js cdn -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
        crossorigin="anonymous"
    ></script>
</body>
</html>
