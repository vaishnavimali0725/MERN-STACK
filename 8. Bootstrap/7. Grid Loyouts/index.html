<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grid Loyout in Bootstarp</title>
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous"
        >
</head>
<body>
    <!-- Basic Grid -->
    <div class="container-lg my-5">
    <h2>Basic Grid:</h2>
        <div class="row">
            <div class="col">
                <div class="p-5 bg-secondary text-light">Col-1</div>
            </div>
            <div class="col">
                <div class="p-5 bg-secondary text-light">Col-2</div>
            </div>
            <div class="col">
                <div class="p-5 bg-secondary text-light">Col-3</div>
            </div>
            <div class="col">
                <div class="p-5 bg-secondary text-light">Col-4</div>
            </div>
            
        </div>
    </div>

    <!-- Column Widths -->
     <div class="conrainter-lg my-5">
        <h4>Column Widths</h4>
        <div class="row">
            <div class="col-8">
                <div class="p-5 bg-secondary text-light">Col-1</div>
            </div>
            <div class="col-2">
                <div class="p-5 bg-secondary text-light">Col-2</div>
            </div>
            <div class="col-2">
                <div class="p-5 bg-secondary text-light">Col-3</div>
            </div>            
        </div>
    </div>

    <!-- Responsive Column Widths -->
     <div class="conrainter-lg my-5">
        <h4>Responsive Column Widths</h4>
        <div class="row">
            <div class="col-sm-4 col-lg-8">
                <div class="p-5 bg-secondary text-light">Col-1</div>
            </div>
            <div class="col-sm-4 col-lg-3">
                <div class="p-5 bg-secondary text-light">Col-2</div>
            </div>
            <div class="col-sm-4 col-lg-3">
                <div class="p-5 bg-secondary text-light">Col-3</div>
            </div>            
        </div>
    </div>

    <!-- Justifying Column -->
     <div class="conrainter-lg my-5">
        <h4>Justifying Column</h4>
        <div class="row justify-content-evenly">
            <div class="col-md-4">
                <div class="p-5 bg-secondary text-light">Col-1</div>
            </div>
            <!-- <div class="col-md-4">
                <div class="p-5 bg-secondary text-light">Col-2</div>
            </div> -->
            <div class="col-md-4">
                <div class="p-5 bg-secondary text-light">Col-3</div>
            </div>            
        </div>
    </div>

     <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
        crossorigin="anonymous">
    </script>
</body>
</html>
