<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handling in Js</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- .containter>.box#box-${box-$}*5 -->
    <h1>Event Listerns:</h1>
    <div class="container" id="cont">
        <div 
            class="box" id="box-1">box-1</div>
        <div class="box" id="box-2" onmousemove="onClickFunc()">box-2</div>
        <div class="box" id="box-3" >box-3</div>
        <div class="box" id="box-4">box-4</div>
        <div class="box" id="box-5">box-5</div>
    </div>
    <br><br>
    <form action="#">
        <input type="text" onkeydown="onKeyDown()" onkeyup="onKeyUp()" onkeypress="keyPressEvent()"/>
    </form>
    <script src="script.js"></script>
</body>
</html>
