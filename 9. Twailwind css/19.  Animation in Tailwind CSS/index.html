<!DOCTYPE html>
<html lang="en">
<head>
    <title>Animation in Tailwind CSS</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="p-10 space-y-10">

    <!-- Bounce Animation -->
    <div class="size-24 bg-yellow-400 mt-10 ml-10 animate-bounce rounded-full"></div>

    <hr>

    <!-- Spin Animation -->
    <div class="h-2 w-32 bg-yellow-500 mt-10 ml-10 animate-spin"></div>

    <hr>

    <!-- Image Spin -->
    <!--
    <img class="m-10 rounded-sm animate-spin"
    src="./funny_mankey.jpg"
    alt="">
    -->

    <!-- Ping Animation -->
    <div class="size-20 bg-amber-500 animate-ping m-10 rounded-full"></div>

    <div class="size-20 bg-amber-500 animate-pluse m-35 rounded-full"></div>
</body>
</html>
