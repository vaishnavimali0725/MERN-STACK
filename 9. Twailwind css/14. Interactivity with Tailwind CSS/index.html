<html lang="en">
<head>
    <title>Interactivity with Tailwind CSS</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>

    <button class="bg-blue-400 p-2 m-2 rounded-md text-white block focus:bg-yellow-500">Register -Focus B</button>

    <button class="bg-blue-400 p-3 m-3 rounded-md text-white block active:bg-green-400">Register - Active Btn</button>

    <button class="bg-blue-400 p-3 m-3 rounded-md text-white block
